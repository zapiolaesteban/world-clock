<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0a;--sf:#141412;--card:#1a1a18;--inp:#222220;--hover:#2a2a27;--dd:#222220;--tx:#e5e3dd;--mid:#b0ada6;--mu:#706e69;--fa:#4a4946;--bd:#2a2a27;--bdL:#1e1e1c;--ac:#5DCAA5;--acBg:#0d2b20;--acTx:#9FE1CB;--btn:#e5e3dd;--btnTx:#0c0c0a;--tileTop:#5DCAA5;--nowBg:#141412;--wBg:#222220;--dSbg:#0d2b20;--dSc:#9FE1CB;--dPbg:#2e2510;--dPc:#FAC775;--dNbg:#0c2640;--dNc:#85B7EB}
.light{--bg:#fff;--sf:#f5f4f0;--card:#fff;--inp:#fff;--hover:#eeedea;--dd:#fff;--tx:#1a1a18;--mid:#5f5e5a;--mu:#888780;--fa:#b4b2a9;--bd:#e5e3dd;--bdL:#f0eeea;--ac:#1D9E75;--acBg:#E1F5EE;--acTx:#085041;--btn:#1a1a18;--btnTx:#fff;--tileTop:#1D9E75;--nowBg:#f0eeea;--wBg:#f5f4f0;--dSbg:#E1F5EE;--dSc:#085041;--dPbg:#FAEEDA;--dPc:#633806;--dNbg:#E6F1FB;--dNc:#0C447C}
html{-webkit-text-size-adjust:100%}body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);transition:background .3s;-webkit-tap-highlight-color:transparent;min-height:100dvh}
.wrap{max-width:760px;margin:0 auto;padding:max(env(safe-area-inset-top,0px),16px) 16px calc(max(env(safe-area-inset-bottom,0px),16px)+16px)}
.mono{font-family:'DM Mono',monospace}
.header{display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:1px solid var(--bd);margin-bottom:18px;overflow:hidden}
.dot{width:9px;height:9px;border-radius:50%;background:var(--ac);flex-shrink:0;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(93,202,165,.4)}50%{box-shadow:0 0 0 5px rgba(93,202,165,0)}}
.hflag{font-size:15px;flex-shrink:0}.hcity{font-size:15px;font-weight:500;white-space:nowrap}.htime{font-size:15px;font-weight:500;white-space:nowrap}.hdate{font-size:12px;color:var(--mu);white-space:nowrap;flex-shrink:0;text-align:right}.hw{font-size:13px;color:var(--mu);display:flex;align-items:center;gap:3px;white-space:nowrap}.hw span:first-child{font-size:15px}.hspacer{flex:1;min-width:4px}
.tbtn{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px;cursor:pointer;color:var(--mu);display:flex;align-items:center;flex-shrink:0;min-width:36px;min-height:36px;justify-content:center;transition:border-color .15s}.tbtn:active{transform:scale(.95)}
.proj{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 16px 14px;margin-bottom:18px}
.proj-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.proj-label{font-size:11px;font-weight:500;color:var(--mu);letter-spacing:.06em;text-transform:uppercase}
.rbtn{font-size:11px;padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--ac);cursor:pointer;font-weight:500;font-family:inherit;min-height:32px;transition:all .15s}.rbtn:active{transform:scale(.96)}
.proj-cards{display:flex;gap:10px;margin-bottom:14px;align-items:stretch}
@media(max-width:520px){.proj-cards{flex-direction:column}}
.pcard{flex:1;min-width:0;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;justify-content:center}
.pcard-now{background:var(--nowBg)}.pcard-to{background:var(--card);border:1.5px solid var(--ac)}
.pcard-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.pcard-lbl-muted{color:var(--fa)}.pcard-lbl-ac{color:var(--ac);font-weight:500}
.pcard-time{font-size:28px;font-weight:500;line-height:1.1}.pcard-tz{font-size:12px;color:var(--mu);font-weight:400;margin-left:4px}.pcard-date{font-size:11px;color:var(--fa);margin-top:3px}
.pcard-inp{width:100%;padding:4px 0;border:none;font-size:28px;font-weight:500;color:var(--tx);background:transparent;outline:none;line-height:1.1;font-family:'DM Mono',monospace}.pcard-inp::placeholder{color:var(--fa);opacity:.5}.pcard-inp:focus{border-bottom:1.5px solid var(--ac);margin-bottom:-1.5px}
.pcard-nudge{display:flex;gap:6px;margin-top:6px}
.nudge-btn{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mid);cursor:pointer;font-weight:500;font-family:inherit;min-height:28px;transition:all .15s}.nudge-btn:active{transform:scale(.95);background:var(--acBg)}
.presets{display:flex;gap:5px;flex-wrap:wrap}
.pbtn{font-size:11px;padding:6px 11px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mid);cursor:pointer;font-weight:500;font-family:inherit;min-height:32px;transition:all .15s}.pbtn:active{transform:scale(.95)}.pbtn.on{border-color:var(--ac);background:var(--acBg);color:var(--acTx)}
.tiles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.tile:last-child:nth-child(odd){grid-column:1/-1}
@media(max-width:480px){.tiles{grid-template-columns:1fr}.tile:last-child:nth-child(odd){grid-column:auto}}
.tile{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px 14px 12px;border-top:2.5px solid var(--tileTop);display:flex;flex-direction:column;min-height:160px;position:relative;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.tile.fw{grid-column:1/-1}
@media(max-width:480px){.tile.fw{grid-column:auto}}
.tile-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;gap:6px}
.tile-info{min-width:0;flex:1}.tile-name{display:flex;align-items:center;gap:5px}.tile-name span:first-child{font-size:15px;flex-shrink:0}.tile-name span:last-child{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tile-sub{font-size:11px;color:var(--fa);margin-top:2px}
.tile-w{text-align:right;flex-shrink:0;background:var(--wBg);border-radius:8px;padding:6px 8px;min-width:64px}.tile-w-row{display:flex;align-items:center;justify-content:flex-end;gap:4px}.tile-w-icon{font-size:20px;line-height:1}.tile-w-temp{font-size:15px;font-weight:500}.tile-w-cond{font-size:10px;color:var(--mu);margin-top:2px}
.tile-proj-lbl{font-size:10px;color:var(--ac);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.tile-proj-time{font-size:24px;font-weight:500;line-height:1.15;letter-spacing:-.02em}.tile-ampm{font-size:14px;font-weight:400;margin-left:1px}.tile-proj-tz{font-size:12px;color:var(--mu);font-weight:400}.tile-gmt{color:var(--fa);font-size:10px}

/* cities section header + edit pencil */
.cities-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.section-label{font-size:11px;font-weight:500;color:var(--mu);letter-spacing:.06em;text-transform:uppercase}
.section-count{color:var(--fa);margin-left:6px;font-weight:400}
.edit-pencil{background:transparent;border:none;color:var(--mu);cursor:pointer;padding:6px;min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s;font-family:inherit}
.edit-pencil:hover{color:var(--ac);background:var(--acBg)}
.edit-pencil:active{transform:scale(.9)}
body.edit .edit-pencil{color:var(--ac);background:var(--acBg)}

/* full-width toggle inside tile (edit mode) */
.fw-btn{position:absolute;top:-7px;right:-7px;width:24px;height:24px;border-radius:50%;background:var(--mid);color:var(--bg);border:2px solid var(--bg);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;padding:0;box-shadow:0 2px 6px rgba(0,0,0,.3)}
body.edit .fw-btn{display:flex}
.fw-btn:active{transform:scale(.9);background:var(--ac);color:#fff}
body.edit .grip{display:none}

/* floating Done button */
.done-float{position:fixed;bottom:max(env(safe-area-inset-bottom,0px),20px);right:20px;background:var(--ac);color:#fff;border:none;border-radius:24px;padding:13px 22px 13px 18px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.2);z-index:500;display:flex;align-items:center;gap:6px;animation:floatIn .3s ease-out}
.light .done-float{box-shadow:0 8px 24px rgba(29,158,117,.35),0 2px 6px rgba(0,0,0,.1)}
.done-float:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.4)}
.done-float:active{transform:translateY(0) scale(.97)}
@keyframes floatIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;display:inline-block;margin-top:3px}.badge-s{background:var(--dSbg);color:var(--dSc)}.badge-p{background:var(--dPbg);color:var(--dPc)}.badge-n{background:var(--dNbg);color:var(--dNc)}
.tile-now{margin-top:auto;padding-top:8px}.tile-now-inner{border-top:1px solid var(--bdL);padding-top:8px}.tile-now-lbl{font-size:10px;color:var(--fa);letter-spacing:.04em;text-transform:uppercase}.tile-now-time{font-size:14px;font-weight:500;color:var(--mid)}.tile-now-tz{font-size:11px;color:var(--fa);font-weight:400}.tile-now-date{font-size:11px;color:var(--fa)}
/* edit mode */
@keyframes wiggle{0%,100%{transform:rotate(-.4deg)}50%{transform:rotate(.4deg)}}
@keyframes wiggle2{0%,100%{transform:rotate(.4deg)}50%{transform:rotate(-.4deg)}}
body.edit .tile,body.edit .composer{animation:wiggle .25s ease-in-out infinite;transform-origin:center}
body.edit .tile:nth-child(2n),body.edit .composer:nth-child(2n){animation-name:wiggle2}
body.edit .tile.dragging,body.edit .composer.dragging{animation:none;z-index:50;box-shadow:0 14px 40px rgba(0,0,0,.6);transform:scale(1.04);opacity:.96;cursor:grabbing}
body.edit .tile{cursor:grab;touch-action:none}
body.edit .composer{cursor:grab;-webkit-user-select:none;user-select:none;touch-action:none}
body.edit .chip-x{display:none!important}
body.edit .tile input,body.edit .tile button:not(.minus-btn):not(.fw-btn),body.edit .composer button:not(.minus-btn){pointer-events:none}
body.edit .pcard-inp{pointer-events:none}
.minus-btn{position:absolute;top:-7px;left:-7px;width:24px;height:24px;border-radius:50%;background:#FF3B30;color:#fff;border:2px solid var(--bg);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:22px;line-height:0;font-weight:300;padding:0;z-index:10;font-family:-apple-system,sans-serif;pointer-events:auto!important;box-shadow:0 2px 6px rgba(0,0,0,.3)}
body.edit .minus-btn{display:flex}
.minus-btn:active{transform:scale(.9);background:#E02921}
.grip{display:none}
.drop-indicator{height:3px;background:var(--ac);border-radius:2px;margin:4px 0;opacity:0;transition:opacity .1s}
.drop-indicator.active{opacity:1}
.drag-ph{border:1.5px dashed var(--bd);border-radius:12px;background:rgba(93,202,165,.04);box-sizing:border-box}
/* quick-add chips */
.quick-adds{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.quick-chip{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:20px;font-size:12px;background:var(--card);border:1px solid var(--bd);color:var(--mid);cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;min-height:32px}
.quick-chip:hover{border-color:var(--ac);color:var(--ac)}
.quick-chip:active{transform:scale(.96);background:var(--acBg)}
.add-strip{display:flex;gap:8px;margin-bottom:22px}
.add-strip input{flex:1;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;font-size:14px;background:var(--inp);color:var(--tx);outline:none;font-family:inherit;min-height:42px}.add-strip input::placeholder{color:var(--fa)}
.add-strip button{padding:10px 16px;border-radius:8px;border:none;background:var(--btn);color:var(--btnTx);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;min-height:42px}.add-strip button:active{opacity:.8}
.dd-list{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--dd);border:1px solid var(--bd);border-radius:8px;z-index:10;overflow:hidden}
.dd-item{padding:10px 14px;cursor:pointer;font-size:14px;color:var(--tx);border-bottom:1px solid var(--bdL);display:flex;align-items:center;gap:8px;min-height:42px}.dd-item:last-child{border-bottom:none}.dd-item:hover{background:var(--hover)}
.composer{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 16px 16px;margin-bottom:18px;position:relative;-webkit-touch-callout:none}
.composer .copy-preview{-webkit-touch-callout:default}
.composer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--bd);color:var(--tx);white-space:nowrap;min-height:34px}.chip-tz{font-size:10px;color:var(--mu)}.chip-x{background:none;border:none;color:var(--fa);font-size:16px;cursor:pointer;padding:0 0 0 4px;line-height:1;min-width:20px;min-height:20px;display:flex;align-items:center;justify-content:center}.chip-x:hover{color:#E24B4A}
.chip-add-wrap{position:relative;display:inline-block}.chip-add{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;background:transparent;border:1px dashed var(--bd);color:var(--ac);cursor:pointer;white-space:nowrap;min-height:34px;transition:all .15s}.chip-add:hover{border-color:var(--ac);background:var(--acBg)}.chip-add:active{transform:scale(.96)}
.chip-dd{position:absolute;top:100%;left:0;margin-top:6px;min-width:180px;background:var(--dd);border:1px solid var(--bd);border-radius:8px;z-index:20;overflow:hidden;max-height:220px;overflow-y:auto}@media(max-width:480px){.chip-dd{left:auto;right:0}}
.chip-dd-item{padding:10px 12px;cursor:pointer;font-size:13px;color:var(--tx);border-bottom:1px solid var(--bdL);display:flex;align-items:center;gap:6px;min-height:40px}.chip-dd-item:last-child{border-bottom:none}.chip-dd-item:hover{background:var(--hover)}
.copy-opts{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.opt-group{display:flex;align-items:center;gap:6px}.opt-label{font-size:10px;color:var(--fa);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;white-space:nowrap}
.opt-pill{font-size:11px;padding:6px 12px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--mid);cursor:pointer;font-weight:500;font-family:inherit;min-height:32px;transition:all .15s;white-space:nowrap}.opt-pill.on{background:var(--acBg);color:var(--acTx);border-color:var(--ac)}.opt-pill:active{transform:scale(.95)}
.flag-btn{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:var(--mid);white-space:nowrap;padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;font-weight:500;font-family:inherit;min-height:32px;transition:all .15s}.flag-btn.on{background:var(--acBg);color:var(--acTx);border-color:var(--ac)}.flag-btn:active{transform:scale(.95)}
.copy-preview{font-size:14px;color:var(--tx);font-weight:500;padding:14px 16px;background:var(--card);border:1px solid var(--bd);border-radius:10px;margin-bottom:12px;line-height:1.7;word-break:break-word;min-height:50px;user-select:all;-webkit-user-select:all}
.copy-empty{font-size:13px;color:var(--fa);padding:14px 0}
.copy-actions{display:flex;gap:10px;align-items:center}
.copy-btn{padding:10px 20px;border-radius:8px;border:1.5px solid var(--ac);background:var(--acBg);color:var(--acTx);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;min-height:42px;transition:all .15s}.copy-btn:hover{background:var(--ac);color:#fff}.copy-btn:active{transform:scale(.97)}.copy-btn.copied{background:var(--ac);color:#fff}
.copy-hint{font-size:11px;color:var(--fa);flex:1}
.wstrip{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:10px 12px;background:var(--sf);border-radius:8px;gap:8px;flex-wrap:wrap}.wstrip span{font-size:11px;color:var(--fa)}
.footer{text-align:center;margin-top:24px;padding-bottom:8px;font-size:11px;color:var(--fa)}

function getOff(tz,d){return(new Date(d.toLocaleString("en-US",{timeZone:tz}))-new Date(d.toLocaleString("en-US",{timeZone:"UTC"})))/60000}
function fmtHMS(d,tz){return new Intl.DateTimeFormat("en-AU",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false,timeZone:tz}).format(d)}
function fmtDate(d,tz){return new Intl.DateTimeFormat("en-AU",{weekday:"short",day:"numeric",month:"short",year:"numeric",timeZone:tz}).format(d)}
function fmtDS(d,tz){return new Intl.DateTimeFormat("en-AU",{weekday:"short",day:"numeric",month:"short",timeZone:tz}).format(d)}
function diffStr(tz,now){const s=getOff(home.tz,now),c=getOff(tz,now),diff=(c-s)/60;if(diff===0)return"same";const abs=Math.abs(diff),h=Math.floor(abs),m=Math.round((abs-h)*60);let r="";if(h>0)r+=h+"h";if(m>0)r+=(r?" ":"")+m+"m";return(diff>0?"+":"\u2212")+r}
function doProj(targetTz,pT,now){if(!pT)return null;const hN=new Date(now.toLocaleString("en-US",{timeZone:home.tz}));const[h,m]=pT.split(":").map(Number);hN.setHours(h,m,0,0);const hO=getOff(home.tz,now),uMs=hN.getTime()-hO*60000,cO=getOff(targetTz,now);const cT=new Date(uMs+cO*60000);const time=cT.toLocaleTimeString("en-AU",{hour:"numeric",minute:"2-digit",hour12:true});const cD=cT.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});const hD=hN.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});let dc="same";if(cD!==hD){const a=new Date(hN);a.setHours(0,0,0,0);const b=new Date(cT);b.setHours(0,0,0,0);dc=b<a?"prev":"next"}return{time,dc}}
function wIcon(code,isDay){if(code==null)return"";if(code===0)return isDay?"\u2600\ufe0f":"\ud83c\udf19";if(code===1)return isDay?"\ud83c\udf24\ufe0f":"\ud83c\udf19";if(code===2)return isDay?"\u26c5":"\u2601\ufe0f";if(code===3)return"\u2601\ufe0f";if(code===45||code===48)return"\ud83c\udf2b\ufe0f";if(code>=51&&code<=57)return"\ud83c\udf26\ufe0f";if(code>=61&&code<=67)return"\ud83c\udf27\ufe0f";if(code>=71&&code<=77)return"\ud83c\udf28\ufe0f";if(code>=80&&code<=82)return"\ud83c\udf26\ufe0f";if(code>=85&&code<=86)return"\ud83c\udf28\ufe0f";if(code>=95)return"\u26c8\ufe0f";return"\u2601\ufe0f"}
function wText(code){if(code==null)return"";if(code===0)return"Clear";if(code===1)return"Mostly clear";if(code===2)return"Partly cloudy";if(code===3)return"Overcast";if(code===45||code===48)return"Foggy";if(code>=51&&code<=57)return"Drizzle";if(code>=61&&code<=67)return"Rainy";if(code>=71&&code<=77)return"Snowy";if(code>=80&&code<=82)return"Showers";if(code>=85&&code<=86)return"Snow showers";if(code>=95)return"Thunderstorm";return"Cloudy"}
function badge(dc){const cls=dc==="same"?"badge-s":dc==="prev"?"badge-p":"badge-n";const lbl=dc==="same"?"same day":dc==="prev"?"yesterday":"tomorrow";return`<span class="badge ${cls}">${lbl}</span>`}
function splitTime(t){if(!t)return{num:"--",ap:""};const m=t.match(/^([\d:]+)\s*(am|pm)$/i);return m?{num:m[1],ap:m[2].toLowerCase()}:{num:t,ap:""}}
function getProjDate(targetTz,pT,now){if(!pT)return null;const hN=new Date(now.toLocaleString("en-US",{timeZone:home.tz}));const[h,m]=pT.split(":").map(Number);hN.setHours(h,m,0,0);const hO=getOff(home.tz,now),uMs=hN.getTime()-hO*60000,cO=getOff(targetTz,now);return new Date(uMs+cO*60000)}
function getTzAbbrev(tz,date){const map=TZ_AB[tz];if(map){if(map[0]===map[1])return map[0];const jan=new Date(date.getFullYear(),0,1),jul=new Date(date.getFullYear(),6,1);const janOff=getOff(tz,jan),julOff=getOff(tz,jul);if(janOff===julOff)return map[0];return getOff(tz,date)===Math.max(janOff,julOff)?map[1]:map[0]}try{const parts=new Intl.DateTimeFormat("en-US",{timeZone:tz,timeZoneName:"short"}).formatToParts(date);const p=parts.find(x=>x.type==="timeZoneName");if(p&&!p.value.startsWith("GMT"))return p.value}catch{}return tz.split("/").pop()}
function getGmtOffset(tz,date){const offMin=getOff(tz,date);const sign=offMin>=0?"+":"-";const abs=Math.abs(offMin);const h=Math.floor(abs/60);const m=abs%60;return m>0?`GMT${sign}${h}:${String(m).padStart(2,"0")}`:`GMT${sign}${h}`}
function fmtProjCopy(tz,pT,now){const projDate=getProjDate(tz,pT,now);if(!projDate)return null;const time=projDate.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).replace(/\s/g,"").toLowerCase();const abbrev=getTzAbbrev(tz,projDate);const gmtOff=getGmtOffset(tz,projDate);let tzLabel;if(showAbbrev&&showGmt)tzLabel=abbrev+" ("+gmtOff+")";else if(showGmt)tzLabel=gmtOff;else tzLabel=abbrev;const hN=new Date(now.toLocaleString("en-US",{timeZone:home.tz}));const[h,m]=pT.split(":").map(Number);hN.setHours(h,m,0,0);const hD=hN.toLocaleDateString("en-US",{day:"numeric",month:"numeric"});const cD=projDate.toLocaleDateString("en-US",{day:"numeric",month:"numeric"});let daySuffix="";if(hD!==cD){const a=new Date(hN);a.setHours(0,0,0,0);const b=new Date(projDate);b.setHours(0,0,0,0);daySuffix=b>a?" (+1 day)":" (-1 day)"}const flag=copyFlags?(CATALOG.find(x=>x.t===tz)?.f||"\ud83c\udf10")+" ":"";return flag+time+" "+tzLabel+daySuffix}
function buildTimeString(){const now=new Date();return copySel.map(c=>fmtProjCopy(c.tz,pTime,now)).filter(Boolean).join(" / ")}

function addCity(name){const c=CATALOG.find(x=>x.n===name);if(!c||cities.find(e=>e.n===name))return;cities.push({...c});searchVal="";searchOpen=false;if(c.la!=null)fetchW(c.n,c.la,c.lo);render()}
function addFirst(){const v=searchVal.trim().toLowerCase();if(!v)return;const c=CATALOG.find(x=>x.n.toLowerCase().includes(v)&&!cities.find(e=>e.n===x.n));if(c)addCity(c.n)}

async function fetchW(name,lat,lon){try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);if(r.ok){const d=await r.json();if(d?.current_weather){weather[name]=d.current_weather;render()}}}catch{}}
async function fetchAllWeather(){const all=[{n:home.name,la:home.lat,lo:home.lon},...cities.filter(c=>c.la!=null)];const lats=all.map(c=>c.la).join(",");const lons=all.map(c=>c.lo).join(",");try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current_weather=true`);if(r.ok){const d=await r.json();if(Array.isArray(d))d.forEach((item,i)=>{if(item?.current_weather)weather[all[i].n]=item.current_weather});else if(d?.current_weather)weather[all[0].n]=d.current_weather}}catch{}weatherTS=new Date().toLocaleString("en-AU",{timeZone:home.tz,day:"numeric",month:"short",hour:"numeric",minute:"2-digit",hour12:true});render()}

composerHTML+=`</div></div>`;
composerHTML+=`<div class="copy-opts"><div class="opt-group"><span class="opt-label">Format</span><button class="opt-pill${showAbbrev?" on":""}" onclick="toggleAbbrev()">AEST</button><button class="opt-pill${showGmt?" on":""}" onclick="toggleGmt()">GMT+10</button></div><button class="flag-btn${copyFlags?" on":""}" onclick="toggleCopyFlags()">Flags</button></div>`;
if(copySel.length>0){composerHTML+=`<div class="copy-preview mono">${copyStr}</div>`;const isCopied=Date.now()<copiedUntil;composerHTML+=`<div class="copy-actions"><button class="copy-btn${isCopied?" copied":""}" onclick="copyTimes()">${isCopied?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy times'}</button><span class="copy-hint">Paste into emails, calendar invites, Slack&hellip;</span></div>`}else{composerHTML+=`<div class="copy-empty">Add cities above to build your time string</div>`}
composerHTML+=`</div>`;

// ---- assemble in order ----
if(copyOnTop){h+=composerHTML+searchHTML+tilesHTML}
else{h+=searchHTML+tilesHTML+composerHTML}

h+=`<div class="wstrip"><span>Weather ${weatherTS?"updated "+weatherTS:"loading..."}</span><button class="rbtn" onclick="fetchAllWeather()">Refresh</button></div>`;
h+=`<div class="footer">All times update live &middot; Offsets from ${home.name}</div>`;
if(editMode)h+=`<button class="done-float" onclick="toggleEdit()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Done</button>`;

// ---- modal (city picker) ----
if(modalOpen){h+=buildModalHTML()}

app.innerHTML=h;

if(modalOpen){setTimeout(()=>{const s=document.getElementById("modal-srch");if(s)s.focus();bindAzTouch()},50)}

if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(focusId==="srch"){el.value=searchVal;try{el.setSelectionRange(searchVal.length,searchVal.length)}catch{}}else if(focusVal!==undefined){el.value=focusVal;if(focusSel!==undefined&&el.setSelectionRange)try{el.setSelectionRange(focusSel,focusSel)}catch{}}}}}

function toggleTheme(){dark=!dark;document.body.classList.toggle("light",!dark);document.getElementById("tc").content=dark?"#0c0c0a":"#ffffff"}
function toggleEdit(){editMode=!editMode;document.body.classList.toggle("edit",editMode);render()}
function setPT(v){pTime=v;render()}
function handleTimeInput(v){const parsed=parseTime(v);if(parsed){try{document.activeElement.blur()}catch{}pTime=parsed;render()}else{const el=document.getElementById("pt-input");if(el)el.value=displayTime(pTime)}}
function nudgeTime(minutes){const[h,m]=pTime.split(":").map(Number);let total=h*60+m+minutes;if(total<0)total+=1440;if(total>=1440)total-=1440;const nh=Math.floor(total/60),nm=total%60;setPT(`${String(nh).padStart(2,"0")}:${String(nm).padStart(2,"0")}`)}
function resetNow(){setPT(getHHMM(home.tz))}

// ---- city picker modal ----
function buildModalHTML(){
const sorted=[...CATALOG].sort((a,b)=>a.n.localeCompare(b.n));
const grouped={};
sorted.forEach(c=>{const l=c.n[0].toUpperCase();if(!grouped[l])grouped[l]=[];grouped[l].push(c)});
const letters=Object.keys(grouped).sort();
const now=new Date();
const btnLbl=modalSelected.length>0?`Add (${modalSelected.length})`:"Add";
const btnDis=modalSelected.length===0?"disabled":"";
const searchEsc=modalSearch.replace(/"/g,"&quot;");
let h=`<div class="modal-backdrop" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">`;
h+=`<div class="modal-header"><button class="modal-btn" onclick="closeModal()">Cancel</button><span class="modal-title">Add cities</span><button class="modal-btn primary" id="modal-add-btn" onclick="commitModal()" ${btnDis}>${btnLbl}</button></div>`;
h+=`<div class="modal-search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="modal-srch" type="text" placeholder="Search cities..." autocomplete="off" value="${searchEsc}" oninput="onModalSearch(this.value)"></div>`;
h+=`<div class="modal-body"><div class="city-list" id="city-list">`;
letters.forEach(letter=>{
h+=`<div class="section-hdr" id="sec-${letter}" data-letter="${letter}">${letter}</div>`;
grouped[letter].forEach(c=>{
const added=!!cities.find(x=>x.n===c.n);
const sel=!added&&modalSelected.includes(c.n);
const safe=c.n.replace(/'/g,"\\'");
const cls=added?" added":(sel?" sel":"");
h+=`<div class="city-row${cls}" data-name="${c.n}" data-letter="${letter}" ${added?'':`onclick="toggleModalSelect('${safe}')"`}>`;
h+=`<span class="crflag">${c.f}</span><div class="crtxt"><div class="crname">${c.n}</div><div class="crmeta">${c.c} &middot; ${diffStr(c.t,now)}</div></div>`;
h+=`<div class="crcheck"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
h+=`</div>`})});
h+=`<div id="no-results" class="no-results" style="display:none">No cities match your search</div>`;
h+=`</div><div class="az-index" id="az-index">`;
letters.forEach(l=>{h+=`<div data-letter="${l}" onclick="jumpTo('${l}')">${l}</div>`});
h+=`</div></div></div></div>`;
return h}

function openModal(){modalOpen=true;modalSelected=[];modalSearch="";render()}
function closeModal(){modalOpen=false;modalSelected=[];modalSearch="";render()}
function commitModal(){
const toAdd=modalSelected.slice();
modalOpen=false;modalSelected=[];modalSearch="";
toAdd.forEach(name=>{const c=CATALOG.find(x=>x.n===name);if(c&&!cities.find(e=>e.n===name)){cities.push({...c});if(c.la!=null)fetchW(c.n,c.la,c.lo)}});
render()}

function toggleModalSelect(name){
if(cities.find(c=>c.n===name))return;
const i=modalSelected.indexOf(name);
if(i>=0)modalSelected.splice(i,1);else modalSelected.push(name);
updateModalDOM()}

function onModalSearch(v){modalSearch=v.toLowerCase().trim();updateModalDOM()}

function updateModalDOM(){
const q=modalSearch;
const letterVisible={};
document.querySelectorAll(".city-row").forEach(row=>{
const name=row.dataset.name;
const c=CATALOG.find(x=>x.n===name);if(!c){row.style.display="none";return}
const matches=!q||name.toLowerCase().includes(q)||c.c.toLowerCase().includes(q);
row.style.display=matches?"":"none";
if(matches)letterVisible[row.dataset.letter]=true;
row.classList.toggle("sel",modalSelected.includes(name))});
document.querySelectorAll(".section-hdr").forEach(hdr=>{hdr.style.display=letterVisible[hdr.dataset.letter]?"":"none"});
const none=document.getElementById("no-results");
if(none)none.style.display=Object.keys(letterVisible).length===0?"":"none";
const az=document.getElementById("az-index");
if(az)az.querySelectorAll("div").forEach(d=>{d.style.opacity=letterVisible[d.dataset.letter]?"1":".25"});
const btn=document.getElementById("modal-add-btn");
if(btn){btn.textContent=modalSelected.length>0?`Add (${modalSelected.length})`:"Add";btn.disabled=modalSelected.length===0}}

function jumpTo(letter){const hdr=document.getElementById("sec-"+letter);const list=document.getElementById("city-list");if(hdr&&list){list.scrollTop=hdr.offsetTop-4}}

function bindAzTouch(){
const az=document.getElementById("az-index");if(!az)return;
const handler=e=>{e.preventDefault();const t=e.touches?e.touches[0]:e;const el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.parentElement===az&&el.dataset.letter){jumpTo(el.dataset.letter)}};
az.addEventListener("touchstart",handler,{passive:false});
az.addEventListener("touchmove",handler,{passive:false})}

// long-press to enter edit mode + drag to reorder
let pressTimer=null,pressStart=null;
function tileTouchStart(e,i){handlePressStart(e,i,"tile")}
function tileMouseDown(e,i){if(e.button!==0)return;handlePressStart(e,i,"tile")}
function composerTouchStart(e){handlePressStart(e,-1,"composer")}
function composerMouseDown(e){if(e.button!==0)return;handlePressStart(e,-1,"composer")}

function handlePressStart(e,idx,type){
if(e.target.closest(".minus-btn,.fw-btn,.chip-x,.chip-add,.chip-dd,.copy-btn,.opt-pill,.flag-btn,input,.dd-list,.dd-item,.quick-chip,.nudge-btn,.pbtn,.rbtn,.edit-pencil,.tbtn,.chip,.done-float,.add-city-btn"))return;
const touch=e.touches?e.touches[0]:e;
pressStart={x:touch.clientX,y:touch.clientY,idx,type,time:Date.now()};
if(editMode){e.preventDefault();startDrag(e,idx,type)}
else{
pressTimer=setTimeout(()=>{
pressTimer=null;if(!pressStart)return;
editMode=true;document.body.classList.add("edit");
if(navigator.vibrate)navigator.vibrate(30);
render();pressStart=null
},500)}}

document.addEventListener("touchmove",e=>{
if(pressTimer&&pressStart){const t=e.touches[0];if(Math.abs(t.clientY-pressStart.y)>8||Math.abs(t.clientX-pressStart.x)>8){clearTimeout(pressTimer);pressTimer=null;pressStart=null}}
if(drag)dragMove(e)
},{passive:false});
document.addEventListener("mousemove",e=>{if(drag)dragMove(e)});
document.addEventListener("touchend",()=>{if(pressTimer){clearTimeout(pressTimer);pressTimer=null}pressStart=null;if(drag)dragEnd()});
document.addEventListener("mouseup",()=>{if(pressTimer){clearTimeout(pressTimer);pressTimer=null}pressStart=null;if(drag)dragEnd()});

function startDrag(e,idx,type){
const touch=e.touches?e.touches[0]:e;
const sel=type==="composer"?'[data-block="composer"]':`.tile[data-idx="${idx}"]`;
const el=document.querySelector(sel);if(!el)return;
const rect=el.getBoundingClientRect();
drag={type,idx,el,offsetX:touch.clientX-rect.left,offsetY:touch.clientY-rect.top};
const ph=document.createElement("div");
ph.style.cssText=`width:${rect.width}px;height:${rect.height}px`;
ph.className="drag-ph";
el.parentNode.insertBefore(ph,el);
drag.placeholder=ph;
el.classList.add("dragging");
el.style.cssText+=`;position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;margin:0;z-index:100`;
interacting=true}

function dragMove(e){
if(!drag)return;
const touch=e.touches?e.touches[0]:e;
if(e.preventDefault)e.preventDefault();
const x=touch.clientX-drag.offsetX;
const y=touch.clientY-drag.offsetY;
drag.el.style.left=x+"px";
drag.el.style.top=y+"px";

if(drag.type==="tile"){
drag.el.style.pointerEvents="none";
const below=document.elementFromPoint(touch.clientX,touch.clientY);
drag.el.style.pointerEvents="";
const target=below?.closest(".tile");
if(target&&target!==drag.el&&!target.classList.contains("drag-ph")){
const ti=parseInt(target.dataset.idx);
if(!isNaN(ti)&&ti!==drag.idx){
[cities[drag.idx],cities[ti]]=[cities[ti],cities[drag.idx]];
const ph=drag.placeholder;const parent=ph.parentNode;
if(ph.nextSibling===target){parent.insertBefore(target,ph)}
else if(target.nextSibling===ph){parent.insertBefore(ph,target)}
else{const anchor=target.nextSibling;parent.insertBefore(target,ph);parent.insertBefore(ph,anchor)}
target.dataset.idx=drag.idx;
drag.el.dataset.idx=ti;
drag.idx=ti
}}}else if(drag.type==="composer"){
const grid=document.getElementById("tiles-grid");
if(grid){
const gridRect=grid.getBoundingClientRect();
const midY=gridRect.top+gridRect.height/2;
const newTop=touch.clientY<midY;
if(newTop!==copyOnTop){
copyOnTop=newTop;
const ph=drag.placeholder;
if(copyOnTop){grid.parentNode.insertBefore(ph,grid)}
else if(grid.nextSibling!==ph){grid.parentNode.insertBefore(ph,grid.nextSibling)}
}}}}

function dragEnd(){
if(!drag)return;
drag.el.classList.remove("dragging");
drag.el.style.cssText="";
if(drag.placeholder&&drag.placeholder.parentNode)drag.placeholder.parentNode.removeChild(drag.placeholder);
drag=null;interacting=false;render()}

try{const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;const meta=TZ_META[tz];if(meta){home={name:meta.name,tz,flag:meta.flag,lat:meta.lat,lon:meta.lon}}else{const city=tz.split("/").pop().replace(/_/g," ");home={...HOME_DEFAULT,name:city,tz,flag:CATALOG.find(x=>x.t===tz)?.f||"\ud83c\udf10"}}}catch{}
pTime=getHHMM(home.tz);
initCities();initCopySel();

document.addEventListener("click",e=>{
if(copyDD&&!e.target.closest(".chip-add-wrap")){copyDD=false;render()}
if(searchOpen&&!e.target.closest(".add-strip")&&!e.target.closest(".dd-list")){searchOpen=false;render()}
});

fetchAllWeather();
if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{home.lat=pos.coords.latitude;home.lon=pos.coords.longitude;fetchAllWeather()},()=>{},{timeout:5000})}
setTimeout(()=>{if(!Object.keys(weather).length)fetchAllWeather()},3000);
setInterval(fetchAllWeather,600000);

render();
setInterval(()=>{if(interacting||modalOpen)tick();else render()},1000);
</script>
</body>
</html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0c0c0a;--sf:#141412;--card:#1a1a18;--inp:#222220;--hover:#2a2a27;--dd:#222220;
--tx:#e5e3dd;--mid:#b0ada6;--mu:#706e69;--fa:#4a4946;
--bd:#2a2a27;--bdL:#1e1e1c;
--ac:#5DCAA5;--acBg:#0d2b20;--acTx:#9FE1CB;
--btn:#e5e3dd;--btnTx:#0c0c0a;--pl:#222220;--plTx:#706e69;
--tileTop:#5DCAA5;--nowBg:#141412;--wBg:#222220;
--dSbg:#0d2b20;--dSc:#9FE1CB;--dPbg:#2e2510;--dPc:#FAC775;--dNbg:#0c2640;--dNc:#85B7EB;
}
.light{
--bg:#ffffff;--sf:#f5f4f0;--card:#ffffff;--inp:#ffffff;--hover:#eeedea;--dd:#ffffff;
--tx:#1a1a18;--mid:#5f5e5a;--mu:#888780;--fa:#b4b2a9;
--bd:#e5e3dd;--bdL:#f0eeea;
--ac:#1D9E75;--acBg:#E1F5EE;--acTx:#085041;
--btn:#1a1a18;--btnTx:#fff;--pl:#f0eeea;--plTx:#888780;
--tileTop:#1D9E75;--nowBg:#f0eeea;--wBg:#f5f4f0;
--dSbg:#E1F5EE;--dSc:#085041;--dPbg:#FAEEDA;--dPc:#633806;--dNbg:#E6F1FB;--dNc:#0C447C;
}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent;min-height:100vh;min-height:100dvh}
.wrap{max-width:760px;margin:0 auto;padding:max(env(safe-area-inset-top,0px),16px) 16px calc(max(env(safe-area-inset-bottom,0px),16px) + 16px)}
.mono{font-family:'DM Mono',monospace}

.header{display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:1px solid var(--bd);margin-bottom:18px;flex-wrap:nowrap;overflow:hidden}
.dot{width:9px;height:9px;border-radius:50%;background:var(--ac);flex-shrink:0;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(93,202,165,.4)}50%{box-shadow:0 0 0 5px rgba(93,202,165,0)}}
.hflag{font-size:15px;flex-shrink:0}
.hcity{font-size:15px;font-weight:500;white-space:nowrap}
.htime{font-size:15px;font-weight:500;white-space:nowrap}
.hdate{font-size:12px;color:var(--mu);text-align:right;white-space:nowrap;flex-shrink:0}
.hw{font-size:13px;color:var(--mu);display:flex;align-items:center;gap:3px;white-space:nowrap}
.hw span:first-child{font-size:15px}
.hspacer{flex:1;min-width:4px}
.tbtn{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px;cursor:pointer;color:var(--mu);display:flex;align-items:center;flex-shrink:0;min-width:36px;min-height:36px;justify-content:center;transition:border-color .15s}
.tbtn:hover{border-color:var(--mu)}
.tbtn:active{transform:scale(.95)}

.proj{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 16px 14px;margin-bottom:18px}
.proj-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.proj-label{font-size:11px;font-weight:500;color:var(--mu);letter-spacing:.06em;text-transform:uppercase}
.rbtn{font-size:11px;padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--ac);cursor:pointer;font-weight:500;font-family:inherit;min-height:32px;transition:all .15s}
.rbtn:hover{background:var(--acBg);border-color:var(--ac)}
.rbtn:active{transform:scale(.96)}
.proj-cards{display:flex;gap:10px;margin-bottom:14px;align-items:stretch}
@media(max-width:520px){.proj-cards{flex-direction:column}}
.pcard{flex:1;min-width:0;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;justify-content:center}
.pcard-now{background:var(--nowBg)}
.pcard-to{background:var(--card);border:1.5px solid var(--ac)}
.pcard-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.pcard-lbl-muted{color:var(--fa)}.pcard-lbl-ac{color:var(--ac);font-weight:500}
.pcard-time{font-size:28px;font-weight:500;line-height:1.1}
.pcard-tz{font-size:12px;color:var(--mu);font-weight:400;margin-left:4px}
.pcard-date{font-size:11px;color:var(--fa);margin-top:3px}
.pcard-inp{width:100%;padding:4px 0;border:none;font-size:28px;font-weight:500;color:var(--tx);background:transparent;outline:none;line-height:1.1;font-family:'DM Mono',monospace}
.pcard-inp::placeholder{color:var(--fa);opacity:.5}
.pcard-inp:focus{border-bottom:1.5px solid var(--ac);margin-bottom:-1.5px}
.pcard-nudge{display:flex;gap:6px;margin-top:6px}
.nudge-btn{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mid);cursor:pointer;font-weight:500;font-family:inherit;transition:all .15s;min-height:28px}
.nudge-btn:hover{border-color:var(--ac);color:var(--ac)}
.nudge-btn:active{transform:scale(.95);background:var(--acBg)}
.presets{display:flex;gap:5px;flex-wrap:wrap}
.pbtn{font-size:11px;padding:6px 11px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mid);cursor:pointer;font-weight:500;font-family:inherit;transition:all .15s;min-height:32px}
.pbtn:active{transform:scale(.95)}
.pbtn.on{border-color:var(--ac);background:var(--acBg);color:var(--acTx)}

.tiles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:22px}
.tile:last-child:nth-child(odd){grid-column:1/-1}
@media(max-width:480px){.tiles{grid-template-columns:1fr}.tile:last-child:nth-child(odd){grid-column:auto}}
.tile{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px 14px 12px;border-top:2.5px solid var(--tileTop);display:flex;flex-direction:column;min-height:170px}
.tile-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;gap:6px}
.tile-info{min-width:0;flex:1}
.tile-name{display:flex;align-items:center;gap:5px}
.tile-name span:first-child{font-size:15px;flex-shrink:0}
.tile-name span:last-child{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile-sub{font-size:11px;color:var(--fa);margin-top:2px}
.tile-w{text-align:right;flex-shrink:0;background:var(--wBg);border-radius:8px;padding:6px 8px;min-width:64px}
.tile-w-row{display:flex;align-items:center;justify-content:flex-end;gap:4px}
.tile-w-icon{font-size:20px;line-height:1}.tile-w-temp{font-size:15px;font-weight:500}
.tile-w-cond{font-size:10px;color:var(--mu);margin-top:2px}
.tile-proj-lbl{font-size:10px;color:var(--ac);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.tile-proj-time{font-size:24px;font-weight:500;line-height:1.15;letter-spacing:-.02em}
.tile-ampm{font-size:14px;font-weight:400;margin-left:1px}
.tile-proj-tz{font-size:12px;color:var(--mu);font-weight:400}
.tile-gmt{color:var(--fa);font-size:10px}
.badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;display:inline-block;margin-top:3px}
.badge-s{background:var(--dSbg);color:var(--dSc)}.badge-p{background:var(--dPbg);color:var(--dPc)}.badge-n{background:var(--dNbg);color:var(--dNc)}
.tile-now{margin-top:auto;padding-top:8px}
.tile-now-inner{border-top:1px solid var(--bdL);padding-top:8px}
.tile-now-lbl{font-size:10px;color:var(--fa);letter-spacing:.04em;text-transform:uppercase}
.tile-now-time{font-size:14px;font-weight:500;color:var(--mid)}
.tile-now-tz{font-size:11px;color:var(--fa);font-weight:400}
.tile-now-date{font-size:11px;color:var(--fa)}

.composer{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 16px 16px;margin-bottom:18px}
.composer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--bd);color:var(--tx);white-space:nowrap;min-height:34px}
.chip-tz{font-size:10px;color:var(--mu)}
.chip-x{background:none;border:none;color:var(--fa);font-size:16px;cursor:pointer;padding:0 0 0 4px;line-height:1;min-width:20px;min-height:20px;display:flex;align-items:center;justify-content:center}
.chip-x:hover{color:#E24B4A}
.chip-add-wrap{position:relative;display:inline-block}
.chip-add{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;background:transparent;border:1px dashed var(--bd);color:var(--ac);cursor:pointer;white-space:nowrap;min-height:34px;transition:all .15s}
.chip-add:hover{border-color:var(--ac);background:var(--acBg)}
.chip-add:active{transform:scale(.96)}
.chip-dd{position:absolute;top:100%;left:0;margin-top:6px;min-width:180px;background:var(--dd);border:1px solid var(--bd);border-radius:8px;z-index:20;overflow:hidden;max-height:220px;overflow-y:auto}
@media(max-width:480px){.chip-dd{left:auto;right:0}}
.chip-dd-item{padding:10px 12px;cursor:pointer;font-size:13px;color:var(--tx);border-bottom:1px solid var(--bdL);display:flex;align-items:center;gap:6px;min-height:40px}
.chip-dd-item:last-child{border-bottom:none}
.chip-dd-item:hover{background:var(--hover)}

.copy-opts{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.opt-group{display:flex;align-items:center;gap:6px}
.opt-label{font-size:10px;color:var(--fa);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;white-space:nowrap}
.opt-pill{font-size:11px;padding:6px 12px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--mid);cursor:pointer;font-weight:500;font-family:inherit;transition:all .15s;white-space:nowrap;min-height:32px}

function copyTimes(){const str=buildTimeString();if(!str)return;navigator.clipboard.writeText(str).then(()=>{copiedUntil=Date.now()+2000;render()}).catch(()=>{const ta=document.createElement("textarea");ta.value=str;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);copiedUntil=Date.now()+2000;render()})}
async function fetchWeather(){
const all=[{name:home.name,lat:home.lat,lon:home.lon},...PINNED];
const lats=all.map(c=>c.lat).join(",");
const lons=all.map(c=>c.lon).join(",");
try{
const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current_weather=true`);
if(r.ok){const d=await r.json();
if(Array.isArray(d)){d.forEach((item,i)=>{if(item?.current_weather)weather[all[i].name]=item.current_weather})}
else if(d?.current_weather){weather[all[0].name]=d.current_weather}}
}catch{}
weatherTS=new Date().toLocaleString("en-AU",{timeZone:home.tz,day:"numeric",month:"short",hour:"numeric",minute:"2-digit",hour12:true});
render()}

function render(){
const now=new Date();const app=document.getElementById("app");
const focusId=document.activeElement?.id;
const focusVal=document.activeElement?.value;
const focusSel=document.activeElement?.selectionStart;
const homeW=weather[home.name];
let h="";

h+=`<div class="header">`;
h+=`<div class="dot"></div>`;
h+=`<span class="hflag">${home.flag}</span>`;
h+=`<span class="hcity">${home.name}</span>`;
h+=`<span class="htime mono">${fmtHMS(now,home.tz)} <span style="font-size:11px;color:var(--mu)">${getTzAbbrev(home.tz,now)}</span></span>`;
if(homeW)h+=`<span class="hw"><span>${wIcon(homeW.weathercode,homeW.is_day)}</span>${Math.round(homeW.temperature)}\u00b0C</span>`;
h+=`<span class="hspacer"></span>`;
h+=`<span class="hdate">${fmtDate(now,home.tz)}</span>`;
h+=`<button class="tbtn" onclick="toggleTheme()" aria-label="Toggle theme">${dark?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}</button>`;
h+=`</div>`;

h+=`<div class="proj">`;
h+=`<div class="proj-head"><span class="proj-label">Time projector</span><button class="rbtn" onclick="resetNow()">Reset to now</button></div>`;
h+=`<div class="proj-cards">`;
h+=`<div class="pcard pcard-now"><div class="pcard-lbl pcard-lbl-muted">right now in ${home.name}</div><div class="pcard-time mono" style="color:var(--mid)">${fmtHMS(now,home.tz)}<span class="pcard-tz">${getTzAbbrev(home.tz,now)}</span></div><div class="pcard-date">${fmtDS(now,home.tz)}</div></div>`;
h+=`<div class="pcard pcard-to"><div class="pcard-lbl pcard-lbl-ac">project to</div><input type="text" class="pcard-inp" id="pt-input" value="${displayTime(pTime)}" placeholder="e.g. 2pm, 14:30" onfocus="this.select()" onkeydown="if(event.key==='Enter'){event.preventDefault();handleTimeInput(this.value)}else if(event.key==='ArrowUp'){event.preventDefault();nudgeTime(30)}else if(event.key==='ArrowDown'){event.preventDefault();nudgeTime(-30)}" onblur="handleTimeInput(this.value)"><div class="pcard-nudge"><button class="nudge-btn" onclick="nudgeTime(-30)">&minus; 30m</button><button class="nudge-btn" onclick="nudgeTime(30)">+ 30m</button></div><div class="pcard-date">${fmtDS(now,home.tz)}</div></div>`;
h+=`</div>`;
h+=`<div class="presets">${PRESETS.map(p=>`<button class="pbtn${pTime===p.v?" on":""}" onclick="setPT('${p.v}')">${p.l}</button>`).join("")}</div>`;
h+=`</div>`;

h+=`<div class="tiles">`;
PINNED.forEach(city=>{
const p=doProj(city.tz,pTime,now);const w=weather[city.name];
const projDate=p?getProjDate(city.tz,pTime,now):null;
const tzAb=projDate?getTzAbbrev(city.tz,projDate):"";
const nowAb=getTzAbbrev(city.tz,now);
h+=`<div class="tile">`;
h+=`<div class="tile-top"><div class="tile-info"><div class="tile-name"><span>${city.flag}</span><span>${city.name}</span></div><div class="tile-sub">${city.country} &middot; ${diffStr(city.tz,now)}</div></div>`;
if(w)h+=`<div class="tile-w"><div class="tile-w-row"><span class="tile-w-icon">${wIcon(w.weathercode,w.is_day)}</span><span class="tile-w-temp mono">${Math.round(w.temperature)}\u00b0</span></div><div class="tile-w-cond">${wText(w.weathercode)}</div></div>`;
else if(weatherTS)h+=`<div class="tile-w" style="opacity:.3"><div style="font-size:11px;color:var(--fa)">No data</div></div>`;
else h+=`<div class="tile-w" style="opacity:.5"><div style="font-size:11px;color:var(--fa)">Loading</div></div>`;
h+=`</div>`;
const projGmt=projDate?getGmtOffset(city.tz,projDate):"";
const nowGmt=getGmtOffset(city.tz,now);
h+=`<div class="tile-proj-lbl">projected</div>`;
const pt=p?splitTime(p.time):{num:"--",ap:""};
h+=`<div class="tile-proj-time mono">${pt.num}${pt.ap?'<span class="tile-ampm">'+pt.ap+'</span>':''} <span class="tile-proj-tz">${tzAb} <span class="tile-gmt">(${projGmt})</span></span></div>`;
if(p)h+=badge(p.dc);
h+=`<div class="tile-now"><div class="tile-now-inner"><div class="tile-now-lbl">right now</div><div class="tile-now-time mono">${fmtHMS(now,city.tz)} <span class="tile-now-tz">${nowAb} <span class="tile-gmt">(${nowGmt})</span></span></div><div class="tile-now-date">${fmtDS(now,city.tz)}</div></div></div>`;
h+=`</div>`;
});
h+=`</div>`;

const copyStr=buildTimeString();
const availableForCopy=[{name:home.name,tz:home.tz},...PINNED.map(c=>({name:c.name,tz:c.tz})),...extra.map(c=>({name:c.n,tz:c.t}))].filter(c=>!copySel.find(s=>s.name===c.name));
h+=`<div class="composer">`;
h+=`<div class="composer-head"><span class="proj-label">Copy for email</span><span style="font-size:11px;color:var(--fa)">${copySel.length} selected</span></div>`;
h+=`<div class="chips">`;
copySel.forEach(c=>{
const projD=getProjDate(c.tz,pTime,now);
const abbr=projD?getTzAbbrev(c.tz,projD):"";
h+=`<div class="chip"><span style="font-size:13px">${FLAGS[c.tz]||"\ud83c\udf10"}</span>${c.name} <span class="chip-tz">${abbr}</span><button class="chip-x" onclick="removeFromCopySel('${c.name}')" aria-label="Remove ${c.name}">&times;</button></div>`});
h+=`<div class="chip-add-wrap"><button class="chip-add" onclick="toggleCopyDD()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add</button>`;
if(copyDD&&availableForCopy.length>0){
h+=`<div class="chip-dd">`;
availableForCopy.forEach(c=>{h+=`<div class="chip-dd-item" onmousedown="addToCopySel('${c.name.replace(/'/g,"\\'")}','${c.tz}')"><span style="font-size:13px">${FLAGS[c.tz]||"\ud83c\udf10"}</span>${c.name}</div>`});
h+=`</div>`}
if(copyDD&&availableForCopy.length===0){h+=`<div class="chip-dd"><div style="padding:10px 12px;font-size:12px;color:var(--fa)">All cities added</div></div>`}
h+=`</div></div>`;
h+=`<div class="copy-opts">`;
h+=`<div class="opt-group"><span class="opt-label">Format</span>`;
h+=`<button class="opt-pill${showAbbrev?" on":""}" onclick="toggleAbbrev()">AEST</button>`;
h+=`<button class="opt-pill${showGmt?" on":""}" onclick="toggleGmt()">GMT+10</button>`;
h+=`</div>`;
h+=`<button class="flag-btn${copyFlags?" on":""}" onclick="toggleCopyFlags()">Flags</button>`;
h+=`</div>`;
if(copySel.length>0){
h+=`<div class="copy-preview mono">${copyStr}</div>`;
const isCopied=Date.now()<copiedUntil;
h+=`<div class="copy-actions"><button class="copy-btn${isCopied?" copied":""}" onclick="copyTimes()">${isCopied?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy times'}</button><span class="copy-hint">Paste into emails, calendar invites, Slack&hellip;</span></div>`;
}else{h+=`<div class="copy-empty">Add cities above to build your time string</div>`}
h+=`</div>`;

h+=`<div class="wstrip"><span>Weather ${weatherTS?"updated "+weatherTS:"loading..."}</span><button class="rbtn" onclick="fetchWeather()">Refresh</button></div>`;

h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span class="section-lbl">More cities</span>${extra.length?`<span style="font-size:12px;color:var(--fa)">${extra.length} added</span>`:""}</div>`;
const srchFiltered=searchVal.trim()?ALL_CITIES.filter(c=>c.n.toLowerCase().includes(searchVal.trim().toLowerCase())&&!extra.find(e=>e.n===c.n)&&!PINNED.find(p=>p.name===c.n)).slice(0,6):[];
h+=`<div style="position:relative"><div class="add-row"><input type="text" id="srch" placeholder="Add a city..." value="${searchVal}" oninput="searchVal=this.value;searchOpen=true;render()" onfocus="searchOpen=true;render()" onkeydown="if(event.key==='Enter'){event.preventDefault();addFirst()}"><button onclick="addFirst()">Add</button></div>`;
if(searchOpen&&srchFiltered.length>0){
h+=`<div class="dd-list">`;
srchFiltered.forEach(c=>{
h+=`<div class="dd-item" ontouchstart="event.preventDefault();addCity('${c.n.replace(/'/g,"\\'")}')" onmousedown="event.preventDefault();addCity('${c.n.replace(/'/g,"\\'")}')">`
+`<span style="font-size:14px">${FLAGS[c.t]||"\ud83c\udf10"}</span><span style="flex:1">${c.n}</span><span style="font-size:12px;color:var(--fa)">${diffStr(c.t,new Date())}</span></div>`;
});
h+=`</div>`}
h+=`</div>`;

if(extra.length){extra.forEach((c,i)=>{
const p2=doProj(c.t,pTime,now);
const xNowAb=getTzAbbrev(c.t,now);
const xProjD=p2?getProjDate(c.t,pTime,now):null;
const xProjAb=xProjD?getTzAbbrev(c.t,xProjD):"";
h+=`<div class="extra-row" ${i===extra.length-1?'style="border-bottom:none"':''}>`;
h+=`<div class="xname"><span class="xname-flag">${FLAGS[c.t]||"\ud83c\udf10"}</span><div class="xname-text"><div class="xname-city">${c.n}</div><div class="xname-off">${diffStr(c.t,now)}</div></div></div>`;
h+=`<div class="xcol xcol-now"><div class="xcol-lbl">now</div><div class="xcol-val mono">${fmtHMS(now,c.t)} <span style="font-size:10px;color:var(--fa)">${xNowAb}</span></div></div>`;
h+=`<div class="xcol xcol-proj"><div class="xcol-lbl">projected</div><div class="xcol-val mono">${p2?p2.time:"--"} <span style="font-size:10px;color:var(--fa)">${xProjAb}</span></div>${p2?badge(p2.dc):""}</div>`;
h+=`<button class="xrem" onclick="removeExtra('${c.n}')" aria-label="Remove ${c.n}">&times;</button>`;
h+=`</div>`})}

h+=`<div class="footer">All times update live &middot; Offsets from ${home.name}</div>`;
app.innerHTML=h;

if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(focusId==="srch"){el.value=searchVal;try{el.setSelectionRange(searchVal.length,searchVal.length)}catch{}}else if(focusVal!==undefined){el.value=focusVal;if(focusSel!==undefined&&el.setSelectionRange)try{el.setSelectionRange(focusSel,focusSel)}catch{}}}}}

function toggleTheme(){dark=!dark;document.body.classList.toggle("light",!dark);document.getElementById("tc").content=dark?"#0c0c0a":"#ffffff"}
function setPT(v){pTime=v;render()}
function handleTimeInput(v){const parsed=parseTime(v);if(parsed){try{document.activeElement.blur()}catch{}pTime=parsed;render()}else{const el=document.getElementById("pt-input");if(el)el.value=displayTime(pTime)}}
function nudgeTime(minutes){const[h,m]=pTime.split(":").map(Number);let total=h*60+m+minutes;if(total<0)total+=1440;if(total>=1440)total-=1440;const nh=Math.floor(total/60),nm=total%60;setPT(`${String(nh).padStart(2,"0")}:${String(nm).padStart(2,"0")}`)}
function resetNow(){setPT(getHHMM(home.tz))}
function onSearch(){searchOpen=true;render()}
function addCity(name){const c=ALL_CITIES.find(x=>x.n===name);if(!c||extra.find(e=>e.n===name))return;extra.push(c);searchVal="";searchOpen=false;render()}
function addFirst(){const v=searchVal.trim().toLowerCase();if(!v)return;const c=ALL_CITIES.find(x=>x.n.toLowerCase().includes(v)&&!extra.find(e=>e.n===x.n)&&!PINNED.find(p=>p.name===x.n));if(c)addCity(c.n)}
function removeExtra(name){extra=extra.filter(c=>c.n!==name);render()}

try{const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;const meta=TZ_META[tz];
if(meta){home={name:meta.name,tz,flag:meta.flag,lat:meta.lat,lon:meta.lon}}
else{const city=tz.split("/").pop().replace(/_/g," ");home={...HOME_DEFAULT,name:city,tz,flag:FLAGS[tz]||"\ud83c\udf10"}}}catch{}
pTime=getHHMM(home.tz);
initCopySel();
document.addEventListener("click",e=>{
if(copyDD&&!e.target.closest(".chip-add-wrap")){copyDD=false;render()}
if(searchOpen&&!e.target.closest(".add-row")&&!e.target.closest(".dd-list")){searchOpen=false;render()}
});

fetchWeather();
if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{home.lat=pos.coords.latitude;home.lon=pos.coords.longitude;fetchWeather()},()=>{},{timeout:5000})}
setTimeout(()=>{if(!Object.keys(weather).length)fetchWeather()},3000);
setInterval(fetchWeather,600000);

render();
setInterval(render,1000);
</script>
</body>
</html>
